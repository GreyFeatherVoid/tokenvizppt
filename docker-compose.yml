services:
  postgres:
    image: postgres:16
    container_name: tokenvizppt-postgres
    environment:
      POSTGRES_DB: tokenvizppt
      POSTGRES_USER: tokenvizppt
      POSTGRES_PASSWORD: tokenvizppt
    ports:
      - "15432:5432"
    volumes:
      - tokenvizppt_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tokenvizppt-redis
    ports:
      - "16379:6379"

volumes:
  tokenvizppt_postgres:
